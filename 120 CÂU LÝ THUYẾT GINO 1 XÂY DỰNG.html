<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>GINO 1 建設 — Luyện Thi Lý Thuyết</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0f2044;
  --blue:#1a4a8a;
  --sky:#2d7dd2;
  --accent:#f0a500;
  --green:#1a8a4a;
  --red:#c0392b;
  --bg:#f0f4fa;
  --card:#ffffff;
  --border:#dde5f0;
  --text:#1a2035;
  --sub:#5a6a8a;
  --correct-bg:#e6f7ed;
  --correct-border:#1a8a4a;
  --wrong-bg:#fdecea;
  --wrong-border:#c0392b;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* ===== HEADER ===== */
.header{
  background:linear-gradient(135deg,var(--navy) 0%,var(--blue) 60%,var(--sky) 100%);
  color:#fff;padding:28px 20px 22px;text-align:center;
  position:relative;overflow:hidden;
}
.header::before{
  content:'';position:absolute;top:-40px;right:-40px;
  width:180px;height:180px;border-radius:50%;
  background:rgba(255,255,255,.06);
}
.header::after{
  content:'';position:absolute;bottom:-30px;left:-30px;
  width:120px;height:120px;border-radius:50%;
  background:rgba(255,255,255,.05);
}
.cre{font-size:11px;opacity:.7;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
.cre strong{color:var(--accent);font-weight:700}
.header h1{font-family:'Noto Serif JP',serif;font-size:20px;font-weight:700;line-height:1.4;margin-bottom:4px}
.header p{font-size:12.5px;opacity:.8;margin-bottom:10px}
.header-badges{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px}
.hbadge{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);
  border-radius:20px;padding:3px 12px;font-size:11.5px;font-weight:500}

/* ===== SCORE BAR ===== */
.scorebar{
  background:#fff;border-bottom:2px solid var(--border);
  padding:10px 16px;display:flex;align-items:center;gap:12px;
  position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.07);
  flex-wrap:wrap;
}
.sc-item{display:flex;align-items:center;gap:5px;font-size:12.5px}
.sc-dot{width:10px;height:10px;border-radius:50%}
.sc-dot.done{background:var(--sky)}
.sc-dot.correct{background:var(--green)}
.sc-dot.wrong{background:var(--red)}
.sc-val{font-weight:700;font-size:14px}
.sc-label{color:var(--sub);font-size:12px}
.sc-div{width:1px;height:20px;background:var(--border)}
.progress-wrap{flex:1;min-width:100px}
.progress-bar{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--sky),var(--accent));
  border-radius:3px;transition:width .4s ease;width:0%}
.prog-text{font-size:11px;color:var(--sub);margin-top:2px}

/* ===== WRAP ===== */
.wrap{max-width:820px;margin:0 auto;padding:16px 14px 40px}

/* ===== SECTION TITLE ===== */
.section-title{
  background:linear-gradient(135deg,var(--navy),var(--blue));
  color:#fff;padding:10px 16px;border-radius:10px;
  font-size:13.5px;font-weight:700;margin:20px 0 12px;
  display:flex;align-items:center;gap:8px;
}
.section-title span{background:var(--accent);color:#000;
  font-size:11px;padding:2px 8px;border-radius:10px;font-weight:700}

/* ===== QUESTION CARD ===== */
.q-card{
  background:var(--card);border:1.5px solid var(--border);border-radius:12px;
  padding:16px 18px;margin-bottom:14px;
  transition:border-color .2s,box-shadow .2s;
}
.q-card.answered{border-color:var(--border)}
.q-card.answered.all-correct{border-left:4px solid var(--green)}
.q-card.answered.has-wrong{border-left:4px solid var(--red)}

.q-num-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.q-num{
  background:var(--navy);color:#fff;
  font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:10px;
  letter-spacing:.5px;
}
.q-pts{font-size:11px;color:var(--sub);background:var(--bg);
  padding:2px 8px;border-radius:8px;border:1px solid var(--border)}

.q-text{
  font-size:14px;font-weight:500;line-height:1.75;color:var(--text);
  margin-bottom:12px;
}
.q-text .blank{
  display:inline-block;background:#e8f0fb;
  border-bottom:2px solid var(--sky);padding:0 8px;
  border-radius:4px 4px 0 0;font-weight:700;color:var(--blue);
  min-width:40px;text-align:center;
}

/* ===== OPTIONS ===== */
.opts{list-style:none;display:flex;flex-direction:column;gap:7px}
.opt{
  display:flex;align-items:center;gap:10px;
  padding:9px 13px;border-radius:9px;
  border:1.5px solid var(--border);background:#fafbfd;
  cursor:pointer;font-size:13px;line-height:1.55;
  transition:all .15s;user-select:none;
}
.opt:hover{border-color:var(--sky);background:#eef4fb}
.opt.selected{border-color:var(--sky);background:#deedfb;color:var(--blue)}
.opt.correct{border-color:var(--correct-border);background:var(--correct-bg);
  color:#145a30;font-weight:600;cursor:default}
.opt.wrong{border-color:var(--wrong-border);background:var(--wrong-bg);
  color:#7b1a13;cursor:default}
.opt.disabled{cursor:default;opacity:.6}
.opt.disabled:hover{border-color:var(--border);background:#fafbfd}
.opt-key{
  min-width:24px;height:24px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;
  background:var(--border);color:var(--sub);
  transition:all .15s;flex-shrink:0;
}
.opt.selected .opt-key{background:var(--sky);color:#fff}
.opt.correct .opt-key{background:var(--green);color:#fff}
.opt.wrong .opt-key{background:var(--red);color:#fff}
.opt-icon{margin-left:auto;font-size:16px;flex-shrink:0}

/* ===== CHECK BUTTON ===== */
.check-btn{
  margin-top:10px;padding:8px 22px;
  border-radius:8px;border:none;
  background:linear-gradient(135deg,var(--sky),var(--blue));
  color:#fff;font-size:13px;font-weight:700;
  cursor:pointer;transition:all .2s;
  font-family:'Noto Sans JP',sans-serif;
  box-shadow:0 2px 6px rgba(45,125,210,.3);
}
.check-btn:hover{transform:translateY(-1px);box-shadow:0 4px 10px rgba(45,125,210,.4)}
.check-btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}

/* ===== EXPLANATION ===== */
.explain{
  display:none;margin-top:12px;
  border-radius:0 9px 9px 9px;overflow:hidden;
}
.explain.show{display:block}
.explain-header{
  background:linear-gradient(135deg,#fff8e1,#fff3cd);
  border-left:4px solid var(--accent);
  padding:8px 13px;
  display:flex;align-items:center;gap:6px;
}
.explain-header .ans-mark{
  font-weight:700;font-size:12px;color:var(--accent);
}
.explain-header .ans-correct{
  background:var(--green);color:#fff;
  padding:2px 9px;border-radius:10px;font-size:12px;font-weight:700;
}
.explain-body{
  background:#fffef5;border:1px solid #ffe082;border-top:none;
  padding:10px 13px;font-size:13px;line-height:1.8;color:#3a2a00;
}
.explain-body .jp{
  font-size:12.5px;color:var(--sub);margin-top:6px;padding-top:6px;
  border-top:1px dashed #e0d0a0;
}
.explain-body strong{color:var(--navy);font-weight:700}

/* ===== RESULT PANEL ===== */
.result-panel{
  display:none;
  background:var(--card);border:2px solid var(--accent);border-radius:16px;
  padding:22px;margin:20px 0;text-align:center;
}
.result-panel.show{display:block}
.result-score{
  font-family:'Noto Serif JP',serif;
  font-size:52px;font-weight:700;color:var(--navy);line-height:1;margin:10px 0 4px;
}
.result-score span{font-size:22px;color:var(--sub);font-family:'Noto Sans JP',sans-serif}
.result-msg{font-size:15px;color:var(--blue);font-weight:700;margin-bottom:16px}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin:16px 0}
.rg-item{background:var(--bg);border-radius:10px;padding:12px 8px;text-align:center}
.rg-val{font-size:22px;font-weight:700;margin-bottom:2px}
.rg-label{font-size:11px;color:var(--sub)}
.rg-item.c .rg-val{color:var(--green)}
.rg-item.w .rg-val{color:var(--red)}
.rg-item.t .rg-val{color:var(--sky)}
.retry-btn{
  background:linear-gradient(135deg,var(--accent),#e09000);
  color:#000;border:none;border-radius:10px;
  padding:11px 30px;font-size:14px;font-weight:700;
  cursor:pointer;font-family:'Noto Sans JP',sans-serif;
  box-shadow:0 3px 10px rgba(240,165,0,.4);
  transition:all .2s;margin-top:8px;
}
.retry-btn:hover{transform:translateY(-2px);box-shadow:0 5px 14px rgba(240,165,0,.5)}

/* ===== SUBMIT BUTTON ===== */
.submit-wrap{text-align:center;margin:24px 0 8px}
.submit-btn{
  background:linear-gradient(135deg,var(--navy),var(--blue));
  color:#fff;border:none;border-radius:12px;
  padding:14px 40px;font-size:15px;font-weight:700;
  cursor:pointer;font-family:'Noto Sans JP',sans-serif;
  box-shadow:0 4px 14px rgba(15,32,68,.3);
  transition:all .2s;
}
.submit-btn:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(15,32,68,.4)}
.submit-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

@media(max-width:540px){
  .header h1{font-size:17px}
  .q-text{font-size:13px}
  .opt{font-size:12.5px;padding:8px 11px}
  .result-score{font-size:40px}
  .result-grid{grid-template-columns:repeat(3,1fr)}
}
</style>
</head>
<body>

<div class="header">
  <div class="cre">特定技能1号 建設分野 | <strong>Anh Trọng Dạy Gino</strong></div>
  <h1>🏗️ GINO 1 建設 — Luyện Thi Lý Thuyết</h1>
  <p>Bộ câu hỏi đề thi tokutei gino 1 XD · Đề 1~4 tổng hợp</p>
  <div class="header-badges">
    <span class="hbadge">📝 120 câu hỏi</span>
    <span class="hbadge">⭐ 4 điểm/câu</span>
    <span class="hbadge">🇻🇳 Giải thích tiếng Việt</span>
  </div>
</div>

<div class="scorebar" id="scorebar">
  <div class="sc-item"><div class="sc-dot done"></div><span class="sc-val" id="sc-done">0</span><span class="sc-label">/120 đã làm</span></div>
  <div class="sc-div"></div>
  <div class="sc-item"><div class="sc-dot correct"></div><span class="sc-val" id="sc-cor" style="color:var(--green)">0</span><span class="sc-label"> đúng</span></div>
  <div class="sc-div"></div>
  <div class="sc-item"><div class="sc-dot wrong"></div><span class="sc-val" id="sc-wrg" style="color:var(--red)">0</span><span class="sc-label"> sai</span></div>
  <div class="sc-div"></div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="prog-fill"></div></div>
    <div class="prog-text" id="prog-text">0% hoàn thành</div>
  </div>
</div>

<div class="wrap" id="quizWrap">
  <div class="result-panel" id="resultPanel">
    <div style="font-size:13px;color:var(--sub);margin-bottom:4px">Kết quả bài thi</div>
    <div class="result-score" id="resScore">0<span>/480</span></div>
    <div class="result-msg" id="resMsg">Chưa có kết quả</div>
    <div class="result-grid">
      <div class="rg-item c"><div class="rg-val" id="res-cor">0</div><div class="rg-label">✅ Đúng</div></div>
      <div class="rg-item w"><div class="rg-val" id="res-wrg">0</div><div class="rg-label">❌ Sai</div></div>
      <div class="rg-item t"><div class="rg-val" id="res-pct">0%</div><div class="rg-label">📊 Tỷ lệ</div></div>
    </div>
    <button class="retry-btn" onclick="retry()">🔄 もう一度 — Làm lại từ đầu</button>
  </div>
  <!-- Questions will be rendered here -->
</div>

<div class="submit-wrap">
  <button class="submit-btn" id="submitBtn" onclick="submitAll()" disabled>📊 採点する — Chấm điểm toàn bài</button>
</div>

<script>
const QS = [
  // ===== ĐỀ 1: Câu 1-30 =====
  {id:1,sec:"📋 Đề 1 — Phần 1: Tổ chức và quan hệ công trường",
   q:"流れよく工事（こうじ）を進（すす）めるには、専門工事業者間（せんもんこうじぎょうしゃかん）の（　　）が大切（たいせつ）です。",
   opts:["競争（きょうそう）","チームワーク","無関心（むかんしん）"],ans:1,
   vi:"Để thi công trôi chảy, các nhà thầu chuyên môn cần có tinh thần làm việc nhóm — <strong>チームワーク</strong>.",
   jp:"スムーズに進めるには各業者間の「チームワーク」が不可欠です。"},

  {id:2,q:"建設現場（けんせつげんば）では、先輩（せんぱい）の技能者（ぎのうしゃ）が（　　）の少（すく）ない後輩（こうはい）にアドバイスをしながら工事（こうじ）を進（すす）めています。",
   opts:["体力（たいりょく）","経験（けいけん）","年齢（ねんれい）"],ans:1,
   vi:"Người đi trước hướng dẫn người ít <strong>kinh nghiệm (経験)</strong> để cùng thi công hiệu quả.",
   jp:"現場では先輩が「経験」の少ない後輩を指導します。"},

  {id:3,q:"一般的（いっぱんてき）な大規模工事（だいきぼこうじ）では、（　　）が発注（はっちゅう）し、ゼネコンが施工（せこう）を行（おこな）います。",
   opts:["職人（しょくにん）","発注者（はっちゅうしゃ）","技能実習生（ぎのうじっしゅうせい）"],ans:1,
   vi:"Trong công trình lớn, <strong>người đặt hàng (発注者)</strong> yêu cầu thi công, còn nhà thầu tổng <strong>(ゼネコン)</strong> chịu trách nhiệm xây dựng.",
   jp:"大規模工事では発注者がゼネコンに工事を依頼します。"},

  {id:4,q:"小規模（しょうきぼ）な住宅工事（じゅうたくこうじ）では、（　　）が元請（もとうけ）となって専門工事業者（せんもんこうじぎょうしゃ）を管理（かんり）します。",
   opts:["工務店（こうむてん）","電気会社（でんきがいしゃ）","不動産屋（ふどうさんや）"],ans:0,
   vi:"Trong công trình nhỏ, <strong>công ty thi công nhà ở (工務店)</strong> đảm nhận vai trò nhà thầu chính và quản lý các nhà thầu phụ.",
   jp:"小規模な住宅工事では「工務店」が元請となります。"},

  {id:5,q:"建設工事（けんせつこうじ）を発注（はっちゅう）する人（ひと）や会社（かいしゃ）を何（なん）というか。",
   opts:["設計者（せっけいしゃ）","監理者（かんりしゃ）","発注者（はっちゅうしゃ）"],ans:2,
   vi:"Người/công ty đặt hàng thi công gọi là <strong>発注者（はっちゅうしゃ）</strong>.",
   jp:"工事を依頼する人や会社を「発注者」といいます。"},

  {id:6,q:"図面通（ずめんどお）りに工事（こうじ）がおこなわれているかを確認（かくにん）するのは誰（だれ）か。",
   opts:["監理者（かんりしゃ）","職人（しょくにん）","現場監督（げんばかんとく）"],ans:0,
   vi:"<strong>監理者</strong> là kỹ sư giám sát, kiểm tra xem công việc có đúng theo bản vẽ hay không.",
   jp:"設計図通りに施工されているかを確認するのが「監理者」です。"},

  {id:7,q:"建設（けんせつ）キャリアアップシステムで、技能者（ぎのうしゃ）の（　　）を登録（とうろく）する。",
   opts:["年齢（ねんれい）","実績（じっせき）や資格（しかく）","家族（かぞく）"],ans:1,
   vi:"Hệ thống Career Up quản lý <strong>thành tích và bằng cấp (実績や資格)</strong> để đánh giá công bằng và nâng cao chất lượng lao động.",
   jp:"建設キャリアアップシステムでは技能者の「実績や資格」を登録します。"},

  {id:8,q:"キャリアアップシステムに登録（とうろく）すると、（　　）が発行（はっこう）される。",
   opts:["安全靴（あんぜんぐつ）","レベルカード","職長手帳（しょくちょうてちょう）"],ans:1,
   vi:"Sau khi đăng ký, người lao động được cấp <strong>thẻ cấp độ kỹ năng (レベルカード)</strong>.",

  {id:9,sec:"📋 Đề 1 — Phần 2: An toàn & KY活動",

   opts:["一体感（いったいかん）","競争心（きょうそうしん）","無関心（むかんしん）"],ans:0,
   vi:"Chào hỏi tạo ra <strong>cảm giác gắn bó (一体感)</strong>, giúp mọi người làm việc hiệu quả hơn.",

  {id:10,q:"朝（あさ）、通路（つうろ）ですれ違（ちが）うときに言（い）うあいさつは（　　）である。",
   opts:["こんにちは","さようなら","おはようございます"],ans:2,
   vi:"Buổi sáng tại công trường, mọi người chào nhau bằng <strong>「おはようございます」</strong>.",

  {id:11,q:"朝礼（ちょうれい）の目的（もくてき）は（　　）を防（ふせ）ぐことである。",
   opts:["けが","休（やす）み","遅刻（ちこく）"],ans:0,
   vi:"Mục đích của buổi chào buổi sáng (朝礼) là phòng tránh <strong>tai nạn thương tích (けが)</strong>.",
   jp:"朝礼の主な目的は「けが」などの労働災害を防ぐことです。"},

  {id:12,q:"朝礼（ちょうれい）は（　　）行（おこな）われる。",

   vi:"Buổi chào đầu ngày được tổ chức <strong>mỗi buổi sáng (毎朝)</strong>.",
   jp:"朝礼は毎朝、作業開始前に行われます。"},

  {id:13,q:"ラジオ体操（たいそう）は、（　　）を防（ふせ）ぐために行（おこな）う。",

  {id:14,q:"作業前（さぎょうまえ）には、（　　）が作業内容（さぎょうないよう）を説明（せつめい）する。",

   vi:"Trước khi làm việc, <strong>tổ trưởng (職長)</strong> thông báo nội dung công việc cho toàn đội.",
   jp:"作業前に「職長」が当日の作業内容を説明します。"},

  {id:15,q:"危険予知活動（きけんよちかつどう）では、作業中（さぎょうちゅう）に（　　）ことを想像（そうぞう）して、事故（じこ）を防（ふせ）ぐ。",
   opts:["早（はや）く終（お）わる","危険（きけん）が起（お）きそうな","みんなが笑（わら）う"],ans:1,

   vi:"Dùng đất cát lấp biển tạo đất liền mới gọi là <strong>埋立工事 (うめたてこうじ)</strong>.",
   jp:"海などに土砂を入れて新しい土地を作る工事を「埋立工事」といいます。"},

  {id:119,q:"船（ふね）が荷物（にもつ）を積（つ）んだり降（お）ろしたりするために停（と）まる場所（ばしょ）を作（つく）る工事（こうじ）は何（なに）か。",
   opts:["トンネル工事（こうじ）","岸壁（がんぺき）工事（こうじ）","防波堤（ぼうはてい）工事（こうじ）"],ans:1,
   vi:"Công trình xây nơi tàu thuyền neo đậu để bốc/dỡ hàng gọi là <strong>岸壁工事 (がんぺきこうじ)</strong>.",
   jp:"船が荷物を積み降ろしする施設を作る工事を「岸壁工事」といいます。"},

  {id:120,q:"波（なみ）が港（みなと）に入（はい）らないようにするための施設（しせつ）を作（つく）る工事（こうじ）は何（なに）か。",
   opts:["岸壁（がんぺき）工事（こうじ）","橋梁（きょうりょう）工事（こうじ）","防波堤（ぼうはてい）工事（こうじ）"],ans:2,
   vi:"Công trình xây đê ngăn sóng cho cảng gọi là <strong>防波堤工事 (ぼうはていこうじ)</strong>.",
   jp:"波が港に入らないようにする施設を作る工事を「防波堤工事」といいます。"},
];

// ===== STATE =====
let answered={}, correct=0, wrong=0, done=0;

// ===== RENDER =====
function render(){
  const wrap=document.getElementById('quizWrap');
  // Keep result panel
  const rp=document.getElementById('resultPanel');
  wrap.innerHTML='';
  wrap.appendChild(rp);

  let curSec='';
  QS.forEach((q,i)=>{
    if(q.sec && q.sec!==curSec){
      curSec=q.sec;
      const st=document.createElement('div');
      st.className='section-title';
      st.innerHTML=`${q.sec} <span>${countSec(q.sec)} câu</span>`;
      wrap.appendChild(st);
    }
    wrap.appendChild(buildCard(q,i));
  });
}

function countSec(sec){
  return QS.filter(q=>q.sec===sec).length;
}

function buildCard(q,idx){
  const card=document.createElement('div');
  card.className='q-card';
  card.id='card_'+idx;

  const optsHtml=q.opts.map((o,i)=>`
    <li class="opt" id="opt_${idx}_${i}" onclick="selectOpt(${idx},${i})">
      <span class="opt-key">${String.fromCharCode(65+i)}</span>
      <span>${o}</span>
      <span class="opt-icon"></span>
    </li>`).join('');

  card.innerHTML=`
    <div class="q-num-row">
      <span class="q-num">第${q.id}問</span>
      <span class="q-pts">4点</span>
    </div>
    <div class="q-text">${q.q}</div>
    <ul class="opts">${optsHtml}</ul>
    <button class="check-btn" id="btn_${idx}" disabled onclick="checkQ(${idx})">こたえを確認する</button>
    <div class="explain" id="ex_${idx}"></div>
  `;
  return card;
}

// ===== INTERACTION =====
function selectOpt(qidx,oidx){
  if(answered[qidx]!==undefined) return;
  const opts=document.querySelectorAll(`[id^="opt_${qidx}_"]`);
  opts.forEach(o=>o.classList.remove('selected'));
  document.getElementById(`opt_${qidx}_${oidx}`).classList.add('selected');
  document.getElementById(`btn_${qidx}`).disabled=false;
  document.getElementById(`btn_${qidx}`).dataset.sel=oidx;
}

function checkQ(qidx){
  const btn=document.getElementById(`btn_${qidx}`);
  const sel=parseInt(btn.dataset.sel);
  const q=QS[qidx];
  const opts=document.querySelectorAll(`[id^="opt_${qidx}_"]`);

  answered[qidx]=sel;
  btn.disabled=true;

  const isCorrect=(sel===q.ans);
  if(isCorrect) correct++; else wrong++;
  done++;

  opts.forEach((o,i)=>{
    o.classList.remove('selected');
    if(i===q.ans){o.classList.add('correct');o.querySelector('.opt-icon').textContent='✅';}
    else if(i===sel&&!isCorrect){o.classList.add('wrong');o.querySelector('.opt-icon').textContent='❌';}
    else o.classList.add('disabled');
    o.onclick=null;
  });

  const card=document.getElementById('card_'+qidx);
  card.classList.add('answered');
  card.classList.add(isCorrect?'all-correct':'has-wrong');

  // Show explanation
  const ex=document.getElementById('ex_'+qidx);
  const ansKey=String.fromCharCode(65+q.ans);
  ex.innerHTML=`
    <div class="explain-header">
      <span class="ans-mark">こたえ：</span>
      <span class="ans-correct">${ansKey}. ${q.opts[q.ans]}</span>
      <span style="margin-left:4px;font-size:20px">${isCorrect?'🎉':'💡'}</span>
    </div>
    <div class="explain-body">
      🇻🇳 ${q.vi}
      <div class="jp">🇯🇵 ${q.jp}</div>
    </div>
  `;
  ex.classList.add('show');

  updateScore();
  checkAllDone();
}

function updateScore(){
  document.getElementById('sc-done').textContent=done;
  document.getElementById('sc-cor').textContent=correct;
  document.getElementById('sc-wrg').textContent=wrong;
  const pct=Math.round(done/QS.length*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-text').textContent=pct+'% hoàn thành';
}

function checkAllDone(){
  if(done===QS.length){
    document.getElementById('submitBtn').disabled=false;
  }
}

function submitAll(){
  const total=QS.length*4;
  const score=correct*4;
  const pct=Math.round(correct/QS.length*100);
  let msg='';
  if(pct>=90) msg='🏆 Xuất sắc! Bạn sẵn sàng thi thật rồi!';
  else if(pct>=70) msg='👍 Khá tốt! Ôn thêm một chút nữa nhé!';
  else if(pct>=50) msg='📚 Cần ôn thêm. Đừng nản, cố lên!';
  else msg='💪 Cần luyện tập nhiều hơn. Xem lại lý thuyết nhé!';

  document.getElementById('resScore').innerHTML=`${score}<span>/${total}</span>`;
  document.getElementById('resMsg').textContent=msg;
  document.getElementById('res-cor').textContent=correct;
  document.getElementById('res-wrg').textContent=wrong;
  document.getElementById('res-pct').textContent=pct+'%';

  const rp=document.getElementById('resultPanel');
  rp.classList.add('show');
  rp.scrollIntoView({behavior:'smooth'});
}

function retry(){
  answered={};correct=0;wrong=0;done=0;
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('submitBtn').disabled=true;
  updateScore();
  render();
  window.scrollTo({top:0,behavior:'smooth'});
}

// ===== INIT =====
render();
</script>
</body>
</html>
